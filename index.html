<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4facfe">
  
<title>Controle de Peso</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:20px;
text-align:center;
}

h1{
color:white;
}

.card{
background:white;
border-radius:15px;
padding:20px;
margin:20px auto;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
}

.metaBox{
position:absolute;
top:15px;
right:15px;
background:#2196f3;
color:white;
padding:6px 10px;
border-radius:8px;
font-size:13px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#4CAF50;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3e8e41;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #eee;
}

#login{
margin-top:100px;
}

.status{
margin:15px 0;
}

.pesoAtual{
font-size:28px;
font-weight:bold;
color:#333;
}

.faltaMeta{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.barraMeta{
width:100%;
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

.progresso{
height:10px;
background:#4facfe;
width:0%;
transition:0.5s;
}
  
</style>

</head>

<body>

<div id="login">

<h2>Controle de Peso</h2>

<p>Digite a senha para acessar</p>

<input type="password" id="senha" placeholder="Senha">

<br><br>

<button onclick="entrar()">Entrar</button>

<p id="erro" style="color:red"></p>

</div>


<div id="app" style="display:none">

<h1>📊 Controle de Peso</h1>


<div class="card">

<div class="metaBox" id="restaE">Meta</div>

<h2>Emerson</h2>

<div class="status">

<div class="pesoAtual" id="pesoAtualE">-- kg</div>

<div class="faltaMeta" id="faltaMetaE"></div>

<div class="barraMeta">
<div class="progresso" id="barraE"></div>
</div>

</div>
  
Meta:
<input type="number" id="metaE">
<button onclick="salvarMeta('E')">Salvar</button>

<br><br>

<input type="date" id="dataE">
<input type="number" id="pesoE" placeholder="Peso">

<button onclick="addPeso('E')">Salvar Peso</button>

<table id="tabelaE">
<tr>
<th>Data</th>
<th>Peso</th>
<th>Excluir</th>
</tr>
</table>

<canvas id="graficoE"></canvas>

</div>


<div class="card">

<div class="metaBox" id="restaM">Meta</div>

<h2>Maiara</h2>

<div class="status">

<div class="pesoAtual" id="pesoAtualM">-- kg</div>

<div class="faltaMeta" id="faltaMetaM"></div>

<div class="barraMeta">
<div class="progresso" id="barraM"></div>
</div>

</div>
  
Meta:
<input type="number" id="metaM">
<button onclick="salvarMeta('M')">Salvar</button>

<br><br>

<input type="date" id="dataM">
<input type="number" id="pesoM" placeholder="Peso">

<button onclick="addPeso('M')">Salvar Peso</button>

<table id="tabelaM">
<tr>
<th>Data</th>
<th>Peso</th>
<th>Excluir</th>
</tr>
</table>

<canvas id="graficoM"></canvas>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
setDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDr3ZxfGM1u3BtIynjphlJVbfs1xc_NlOI",
authDomain: "controle-e3ae5.firebaseapp.com",
projectId: "controle-e3ae5",
storageBucket: "controle-e3ae5.firebasestorage.app",
messagingSenderId: "718085986151",
appId: "1:718085986151:web:683b1caef3258c957181c2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.entrar=function(){

let senha=document.getElementById("senha").value

if(senha==="0415"){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

}else{

document.getElementById("erro").innerText="Senha incorreta"

}

}


let dadosE=[]
let dadosM=[]
let metaE=""
let metaM=""

window.salvarMeta=async function(pessoa){

if(pessoa=="E"){

metaE=document.getElementById("metaE").value

await setDoc(doc(db,"metas","E"),{meta:Number(metaE)})

}

if(pessoa=="M"){

metaM=document.getElementById("metaM").value

await setDoc(doc(db,"metas","M"),{meta:Number(metaM)})

}

}


window.addPeso=async function(pessoa){

let data
let peso

if(pessoa=="E"){

data=document.getElementById("dataE").value
peso=document.getElementById("pesoE").value

await addDoc(collection(db,"pesos"),{pessoa:"E",data,peso:Number(peso)})

}

if(pessoa=="M"){

data=document.getElementById("dataM").value
peso=document.getElementById("pesoM").value

await addDoc(collection(db,"pesos"),{pessoa:"M",data,peso:Number(peso)})

}

}


window.deletar=async function(id){

await deleteDoc(doc(db,"pesos",id))

}


let chartE
let chartM

function formatarData(data){

let d = new Date(data)

let dia = String(d.getDate()).padStart(2,"0")
let mes = String(d.getMonth()+1).padStart(2,"0")

return dia + "/" + mes

}

function render(){

let tabelaE=document.getElementById("tabelaE")
let tabelaM=document.getElementById("tabelaM")

tabelaE.innerHTML="<tr><th>Data</th><th>Peso</th><th>Excluir</th></tr>"
tabelaM.innerHTML="<tr><th>Data</th><th>Peso</th><th>Excluir</th></tr>"

let pesoAtualE="--"
let pesoAtualM="--"

if(dadosE.length>0){
pesoAtualE=dadosE[dadosE.length-1].peso
}

if(dadosM.length>0){
pesoAtualM=dadosM[dadosM.length-1].peso
}

document.getElementById("pesoAtualE").innerText=pesoAtualE+" kg"
document.getElementById("pesoAtualM").innerText=pesoAtualM+" kg"
dadosE.forEach((d)=>{

tabelaE.innerHTML+=`
<tr>
<td>${formatarData(d.data)}</td>
<td>${d.peso}</td>
<td><button onclick="deletar('${d.id}')">❌</button></td>
</tr>
`

})

dadosM.forEach((d)=>{

tabelaM.innerHTML+=`
<tr>
<td>${formatarData(d.data)}</td>
<td>${d.peso}</td>
<td><button onclick="deletar('${d.id}')">❌</button></td>
</tr>
`

})

criarGrafico("E",dadosE,metaE)
criarGrafico("M",dadosM,metaM)

if(metaE && dadosE.length){

let ultimo=dadosE[dadosE.length-1].peso

document.getElementById("restaE").innerText=
"Faltam "+(ultimo-metaE).toFixed(1)+" kg"

}

if(metaM && dadosM.length){

let ultimo=dadosM[dadosM.length-1].peso

document.getElementById("restaM").innerText=
"Faltam "+(ultimo-metaM).toFixed(1)+" kg"

}

}


function criarGrafico(pessoa,dados,meta){

let datas=dados.map(d=>formatarData(d.data))
let pesos=dados.map(d=>d.peso)

let metaLinha=datas.map(()=>meta)

if(pessoa=="E" && chartE) chartE.destroy()
if(pessoa=="M" && chartM) chartM.destroy()

let ctx=document.getElementById("grafico"+pessoa)

let grafico=new Chart(ctx,{

type:"line",

data:{

labels:datas,

datasets:[

{
label:"Peso",
data:pesos,
tension:0.4
},

{
label:"Meta",
data:metaLinha,
borderDash:[10,5]
}

]

},

options:{
plugins:{
legend:{
position:"bottom"
}
}
}

})

if(pessoa=="E") chartE=grafico
if(pessoa=="M") chartM=grafico

}


onSnapshot(collection(db,"pesos"),(snapshot)=>{
onSnapshot(doc(db,"metas","E"),(docSnap)=>{

if(docSnap.exists()){

metaE = docSnap.data().meta
document.getElementById("metaE").value = metaE
render()

}

})

onSnapshot(doc(db,"metas","M"),(docSnap)=>{

if(docSnap.exists()){

metaM = docSnap.data().meta
document.getElementById("metaM").value = metaM
render()

}

})

dadosE=[]
dadosM=[]

snapshot.forEach(doc=>{

let d={id:doc.id,...doc.data()}

if(d.pessoa=="E") dadosE.push(d)
if(d.pessoa=="M") dadosM.push(d)

})

dadosE.sort((a,b)=> new Date(a.data) - new Date(b.data))
dadosM.sort((a,b)=> new Date(a.data) - new Date(b.data))

render()

})

</script>

  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
}
</script>

</body>
</html>

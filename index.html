<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Peso</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6fb;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:25px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,button{
padding:10px;
margin:5px;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:8px;
}

.delete{
background:red;
}
</style>
</head>

<body>

<div id="login" class="container">

<h2>Login</h2>

<input type="password" id="senha" placeholder="Digite a senha">
<br><br>

<button onclick="entrar()">Entrar</button>

</div>


<div id="app" class="container" style="display:none">

<h2>Controle de Peso</h2>

<h3>Meta Emerson</h3>
<input id="metaEmerson" type="number">
<button onclick="salvarMeta('emerson')">Salvar</button>

<h3>Meta Maiara</h3>
<input id="metaMaiara" type="number">
<button onclick="salvarMeta('maiara')">Salvar</button>

<hr>

<h3>Adicionar Peso</h3>

<input id="nome" placeholder="Nome (Emerson ou Maiara)">
<input id="peso" type="number" placeholder="Peso">

<button onclick="addPeso()">Salvar Peso</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Peso</th>
<th>Data</th>
<th></th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<canvas id="grafico"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDr3ZxfGM1u3BtIynjphlJVbfs1xc_NlOI",
authDomain: "controle-e3ae5.firebaseapp.com",
projectId: "controle-e3ae5",
storageBucket: "controle-e3ae5.firebasestorage.app",
messagingSenderId: "718085986151",
appId: "1:718085986151:web:683b1caef3258c957181c2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabela = document.getElementById("tabela");

let dados = [];

const ctx = document.getElementById("grafico");

const chart = new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Peso",
data:[]
}]
}
});

window.entrar = function(){

const senha = document.getElementById("senha").value;

if(senha === "1234"){   // MUDE A SENHA AQUI

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Senha incorreta");

}

}


window.addPeso = async function(){

const nome = document.getElementById("nome").value;
const peso = document.getElementById("peso").value;

if(!nome || !peso) return;

await addDoc(collection(db,"pesos"),{
nome,
peso:Number(peso),
data:new Date().toLocaleDateString()
});

document.getElementById("peso").value="";
}

window.salvarMeta = async function(nome){

let valor;

if(nome=="emerson"){
valor=document.getElementById("metaEmerson").value;
}else{
valor=document.getElementById("metaMaiara").value;
}

await setDoc(doc(db,"metas",nome),{
meta:Number(valor)
});
}


function atualizarTabela(){

tabela.innerHTML="";

dados.forEach((d)=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.nome}</td>
<td>${d.peso}</td>
<td>${d.data}</td>
<td><button class="delete" onclick="deletar('${d.id}')">X</button></td>
`;

tabela.appendChild(tr);

});

chart.data.labels=dados.map(d=>d.data);
chart.data.datasets[0].data=dados.map(d=>d.peso);

chart.update();

}

window.deletar = async function(id){

await deleteDoc(doc(db,"pesos",id));

}

onSnapshot(collection(db,"pesos"),(snapshot)=>{

dados=[];

snapshot.forEach((doc)=>{

dados.push({
id:doc.id,
...doc.data()
});

});

atualizarTabela();

});

</script>

</body>
</html>

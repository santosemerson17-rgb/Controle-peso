<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Peso</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef4ff;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
position:relative;
border-top:6px solid #1976d2;
}

.metaBox{
position:absolute;
top:10px;
right:10px;
background:#1976d2;
color:white;
padding:6px 10px;
border-radius:6px;
font-size:13px;
}

input{
padding:10px;
margin:5px;
font-size:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
background:#1976d2;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.delete{
background:#e53935;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

#login{
max-width:300px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div id="login">

<h2>Entrar</h2>

<input type="password" id="senha" placeholder="Senha">
<br><br>

<button onclick="entrar()">Entrar</button>

</div>

<div id="app" style="display:none">

<div class="container">

<h1>Controle de Peso</h1>

<div class="card">

<div class="metaBox" id="restaEmerson">Meta</div>

<h2>Emerson</h2>

<input id="metaEmerson" type="number" placeholder="Meta de peso">
<button onclick="salvarMeta('Emerson','metaEmerson')">Salvar Meta</button>

<br><br>

<input id="pesoEmerson" type="number" placeholder="Peso">
<input id="dataEmerson" type="date">

<button onclick="addPeso('Emerson','pesoEmerson','dataEmerson')">
Salvar Peso
</button>

<table>

<thead>
<tr>
<th>Peso</th>
<th>Data</th>
<th></th>
</tr>
</thead>

<tbody id="listaEmerson"></tbody>

</table>

</div>


<div class="card">

<div class="metaBox" id="restaMaiara">Meta</div>

<h2>Maiara</h2>

<input id="metaMaiara" type="number" placeholder="Meta de peso">
<button onclick="salvarMeta('Maiara','metaMaiara')">Salvar Meta</button>

<br><br>

<input id="pesoMaiara" type="number" placeholder="Peso">
<input id="dataMaiara" type="date">

<button onclick="addPeso('Maiara','pesoMaiara','dataMaiara')">
Salvar Peso
</button>

<table>

<thead>
<tr>
<th>Peso</th>
<th>Data</th>
<th></th>
</tr>
</thead>

<tbody id="listaMaiara"></tbody>

</table>

</div>

<canvas id="grafico"></canvas>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyDr3ZxfGM1u3BtIynjphlJVbfs1xc_NlOI",
authDomain: "controle-e3ae5.firebaseapp.com",
projectId: "controle-e3ae5",
storageBucket: "controle-e3ae5.firebasestorage.app",
messagingSenderId: "718085986151",
appId: "1:718085986151:web:683b1caef3258c957181c2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.entrar=function(){

if(document.getElementById("senha").value==="0415"){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}else{

alert("Senha incorreta");

}

}


const listaEmerson=document.getElementById("listaEmerson");
const listaMaiara=document.getElementById("listaMaiara");

let metas={};
let dados=[];

const ctx=document.getElementById("grafico");

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{label:"Emerson",data:[],borderWidth:3},
{label:"Maiara",data:[],borderWidth:3}
]
}
});


window.salvarMeta=async function(nome,input){

const valor=document.getElementById(input).value;

await setDoc(doc(db,"metas",nome),{
meta:Number(valor)
});

metas[nome]=Number(valor);

}


window.addPeso=async function(nome,input,dataInput){

const peso=document.getElementById(input).value;
const data=document.getElementById(dataInput).value;

if(!peso || !data) return;

await addDoc(collection(db,"pesos"),{
nome,
peso:Number(peso),
data
});

}


window.deletar=async function(id){

await deleteDoc(doc(db,"pesos",id));

}


function atualizar(){

listaEmerson.innerHTML="";
listaMaiara.innerHTML="";

const pesosE=[];
const pesosM=[];
const datas=[];

let ultimoE=null;
let ultimoM=null;

dados.forEach(d=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.peso}</td>
<td>${d.data}</td>
<td><button class="delete" onclick="deletar('${d.id}')">X</button></td>
`;

if(d.nome==="Emerson"){
listaEmerson.appendChild(tr);
pesosE.push(d.peso);
ultimoE=d.peso;
}else{
listaMaiara.appendChild(tr);
pesosM.push(d.peso);
ultimoM=d.peso;
}

datas.push(d.data);

});

chart.data.labels=datas;
chart.data.datasets[0].data=pesosE;
chart.data.datasets[1].data=pesosM;

chart.update();

if(metas["Emerson"] && ultimoE){
document.getElementById("restaEmerson").innerText=
"Faltam "+(ultimoE-metas["Emerson"]).toFixed(1)+" kg";
}

if(metas["Maiara"] && ultimoM){
document.getElementById("restaMaiara").innerText=
"Faltam "+(ultimoM-metas["Maiara"]).toFixed(1)+" kg";
}

}


onSnapshot(collection(db,"pesos"),(snapshot)=>{

dados=[];

snapshot.forEach((doc)=>{

dados.push({
id:doc.id,
...doc.data()
});

});

atualizar();

});

</script>

</body>
</html>

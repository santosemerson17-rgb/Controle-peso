<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Peso</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef4ff;
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:30px;
color:#0d47a1;
}

.cards{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:12px;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
position:relative;
border-top:6px solid #1976d2;
}

.metaBox{
position:absolute;
top:10px;
right:10px;
background:#1976d2;
color:white;
padding:8px 12px;
border-radius:8px;
font-size:14px;
}

input{
padding:10px;
margin:5px;
width:80%;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
background:#1976d2;
color:white;
}

button:hover{
background:#0d47a1;
}

.delete{
background:#e53935;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

canvas{
margin-top:40px;
}

</style>
</head>

<body>

<div class="container">

<h1>Controle de Peso</h1>

<div class="cards">

<div class="card">

<div class="metaBox" id="restaEmerson">
Meta
</div>

<h2>Emerson</h2>

<input id="metaEmerson" type="number" placeholder="Meta de peso">
<button onclick="salvarMeta('Emerson','metaEmerson')">Salvar Meta</button>

<br><br>

<input id="pesoEmerson" type="number" placeholder="Peso atual">
<button onclick="addPeso('Emerson','pesoEmerson')">Salvar Peso</button>

<table>
<thead>
<tr>
<th>Peso</th>
<th>Data</th>
<th></th>
</tr>
</thead>

<tbody id="listaEmerson"></tbody>

</table>

</div>


<div class="card">

<div class="metaBox" id="restaMaiara">
Meta
</div>

<h2>Maiara</h2>

<input id="metaMaiara" type="number" placeholder="Meta de peso">
<button onclick="salvarMeta('Maiara','metaMaiara')">Salvar Meta</button>

<br><br>

<input id="pesoMaiara" type="number" placeholder="Peso atual">
<button onclick="addPeso('Maiara','pesoMaiara')">Salvar Peso</button>

<table>

<thead>
<tr>
<th>Peso</th>
<th>Data</th>
<th></th>
</tr>
</thead>

<tbody id="listaMaiara"></tbody>

</table>

</div>

</div>

<canvas id="grafico"></canvas>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDr3ZxfGM1u3BtIynjphlJVbfs1xc_NlOI",
authDomain: "controle-e3ae5.firebaseapp.com",
projectId: "controle-e3ae5",
storageBucket: "controle-e3ae5.firebasestorage.app",
messagingSenderId: "718085986151",
appId: "1:718085986151:web:683b1caef3258c957181c2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const listaEmerson = document.getElementById("listaEmerson");
const listaMaiara = document.getElementById("listaMaiara");

let metas = {};
let dados=[];

const ctx=document.getElementById("grafico");

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{
label:"Emerson",
data:[],
borderWidth:3
},
{
label:"Maiara",
data:[],
borderWidth:3
}
]
}
});

window.salvarMeta=async function(nome,input){

const valor=document.getElementById(input).value;

await setDoc(doc(db,"metas",nome),{
meta:Number(valor)
});

metas[nome]=Number(valor);

}

window.addPeso=async function(nome,inputId){

const peso=document.getElementById(inputId).value;

if(!peso) return;

await addDoc(collection(db,"pesos"),{
nome,
peso:Number(peso),
data:new Date().toLocaleDateString()
});

document.getElementById(inputId).value="";

}

window.deletar=async function(id){

await deleteDoc(doc(db,"pesos",id));

}

function atualizar(){

listaEmerson.innerHTML="";
listaMaiara.innerHTML="";

const pesosEmerson=[];
const pesosMaiara=[];
const datas=[];

let ultimoEmerson=null;
let ultimoMaiara=null;

dados.forEach(d=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${d.peso}</td>
<td>${d.data}</td>
<td><button class="delete" onclick="deletar('${d.id}')">X</button></td>
`;

if(d.nome=="Emerson"){
listaEmerson.appendChild(tr);
pesosEmerson.push(d.peso);
ultimoEmerson=d.peso;
}else{
listaMaiara.appendChild(tr);
pesosMaiara.push(d.peso);
ultimoMaiara=d.peso;
}

datas.push(d.data);

});

chart.data.labels=datas;
chart.data.datasets[0].data=pesosEmerson;
chart.data.datasets[1].data=pesosMaiara;

chart.update();

if(metas["Emerson"] && ultimoEmerson){
document.getElementById("restaEmerson").innerText=
"Faltam "+(ultimoEmerson-metas["Emerson"]).toFixed(1)+" kg";
}

if(metas["Maiara"] && ultimoMaiara){
document.getElementById("restaMaiara").innerText=
"Faltam "+(ultimoMaiara-metas["Maiara"]).toFixed(1)+" kg";
}

}

onSnapshot(collection(db,"pesos"),(snapshot)=>{

dados=[];

snapshot.forEach((doc)=>{

dados.push({
id:doc.id,
...doc.data()
});

});

atualizar();

});

</script>

</body>
</html>
